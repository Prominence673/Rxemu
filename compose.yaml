services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: music-cli-dev
    user: "1000:1000"

    environment:
      PULSE_SERVER: unix:/mnt/wslg/PulseServer

    volumes:
      - .:/app
      - /mnt/wslg:/mnt/wslg

    working_dir: /app

    stdin_open: true
    tty: true